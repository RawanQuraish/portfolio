<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">

{% seo %}

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#14532d">

    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #f0fdf4;
        color: #14532d;
      }

      /* HERO */
      .custom-hero {
        background: linear-gradient(135deg, #14532d, #22c55e, #86efac);
        padding: 80px 20px;
        color: white;
      }

      .hero-content {
        max-width: 1000px;
        margin: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 30px;
        flex-wrap: wrap;
      }

      .hero-text h1 {
        font-size: 48px;
        margin: 0;
      }

      .hero-text h2 {
        font-size: 18px;
        font-weight: normal;
        opacity: 0.9;
      }

      .hero-image img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid white;
        object-fit: cover;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      }

      /* BUTTONS */
      .btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 18px;
        background: white;
        color: #14532d;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        margin-right: 10px;
      }

      .btn:hover {
        background: #ecfdf5;
      }

      /* MAIN CONTENT */
      .main-content {
        max-width: 1000px;
        margin: auto;
        padding: 40px 20px;
      }

      h2 {
        color: #166534;
        margin-top: 40px;
      }

      ul li {
        background: white;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      }

      a {
        color: #16a34a;
      }

      a:hover {
        color: #14532d;
      }

      footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>

  <body>

    <header class="custom-hero" role="banner">
      <div class="hero-content">

        <div class="hero-text">
          <h1>{{ page.title | default: site.title }}</h1>
          <h2>{{ page.description | default: site.description }}</h2>

          <a href="#content" class="btn">View Projects</a>
          <a href="https://github.com/RawanQuraish" class="btn">GitHub</a>
        </div>

        <div class="hero-image">
          <img src="{{ '/assets/images/IMG_20221130_030034_279.jpg' | relative_url }}" alt="Profile Photo">
        </div>

      </div>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>

    <footer>
      Built with ❤️ using GitHub Pages
    </footer>

  </body>
</html>
